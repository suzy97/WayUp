<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WayUp Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="info-panel">
        <p class="eyebrow">WayUp Clickable Prototype</p>
        <h1>출퇴근 시간을 흘려보내지 않게</h1>
        <p class="lead">
          시뮬레이터 없이도 바로 볼 수 있도록, 모바일 앱 핵심 플로우를
          브라우저에서 재현한 프로토타입입니다.
        </p>

        <section class="info-block">
          <h2>포함한 플로우</h2>
          <ul>
            <li>온보딩</li>
            <li>목표/루틴 설정</li>
            <li>이동 감지 프롬프트</li>
            <li>행동 추천</li>
            <li>세션 진행/완료</li>
            <li>일간 리포트</li>
          </ul>
        </section>

        <section class="info-block">
          <h2>조작 방법</h2>
          <ul>
            <li>오른쪽 모바일 화면 안 버튼을 눌러 단계 이동</li>
            <li>상단 `Demo Flow` 칩으로 원하는 화면 즉시 이동</li>
            <li>마지막 `리포트` 화면까지 흐름 확인 가능</li>
          </ul>
        </section>

        <div class="chip-row" id="screen-jumps"></div>
      </aside>

      <main class="device-stage">
        <div class="phone">
          <div class="phone-top">
            <span>12:58</span>
            <span>WayUp</span>
            <span>46%</span>
          </div>

          <div class="screen" id="screen"></div>
        </div>
      </main>
    </div>

    <template id="screen-welcome">
      <section class="screen-view welcome-view">
        <div class="hero-blob"></div>
        <p class="screen-kicker">Morning commute, but intentional</p>
        <h2>출퇴근 시간을,<br />내 편으로</h2>
        <p class="screen-copy">
          지하철이나 버스를 타는 순간 WayUp이 시작됩니다. 숏폼으로 흘러가기 전,
          지금 할 수 있는 가장 작은 행동을 제안합니다.
        </p>

        <div class="preview-stack">
          <div class="preview-card">
            <span>Auto detect</span>
            <strong>강남역 → 성수동</strong>
            <small>예상 22분</small>
          </div>
          <div class="preview-card muted">
            <span>Suggested</span>
            <strong>3분 회고 먼저 할까요?</strong>
          </div>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-primary" data-next="goals">시작하기</button>
        </div>
      </section>
    </template>

    <template id="screen-goals">
      <section class="screen-view">
        <div class="top-copy">
          <p class="screen-kicker">Step 1</p>
          <h2>출퇴근 시간에<br />무엇을 얻고 싶나요?</h2>
          <p class="screen-copy">
            1~3개를 고르면 이동시간 길이와 시간대에 맞는 행동을 추천합니다.
          </p>
        </div>

        <div class="selection-grid">
          <button class="pill selected">영어</button>
          <button class="pill">독서</button>
          <button class="pill selected">회고</button>
          <button class="pill">뉴스</button>
          <button class="pill">이직 준비</button>
          <button class="pill selected">의도적 휴식</button>
        </div>

        <div class="floating-note">
          <span>선택됨</span>
          <strong>영어 · 회고 · 의도적 휴식</strong>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-secondary" data-next="welcome">이전</button>
          <button class="btn btn-primary" data-next="routine">다음</button>
        </div>
      </section>
    </template>

    <template id="screen-routine">
      <section class="screen-view">
        <div class="top-copy">
          <p class="screen-kicker">Step 2</p>
          <h2>출근길과 퇴근길은<br />다르게 설계합니다</h2>
          <p class="screen-copy">
            아침엔 준비, 저녁엔 회복. 둘을 같은 생산성 모드로 묶지 않습니다.
          </p>
        </div>

        <div class="mode-card accent-sunrise">
          <span class="mode-label">출근길</span>
          <strong>오늘 할 일 정리</strong>
          <small>보조 루틴: 영어 5분, 뉴스 1개</small>
        </div>

        <div class="mode-card accent-dusk">
          <span class="mode-label">퇴근길</span>
          <strong>회복 모드</strong>
          <small>보조 루틴: 회고 3분, 저장 글 1개</small>
        </div>

        <div class="permission-banner">
          <span>권한 안내</span>
          <p>위치와 알림을 허용하면 출퇴근 시작 시 자동으로 제안할 수 있어요.</p>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-secondary" data-next="goals">이전</button>
          <button class="btn btn-primary" data-next="home">완료</button>
        </div>
      </section>
    </template>

    <template id="screen-home">
      <section class="screen-view home-view">
        <header class="home-header">
          <div>
            <p class="screen-kicker">Today</p>
            <h2>안녕하세요, 효진님</h2>
          </div>
          <button class="ghost-btn" data-next="report">리포트</button>
        </header>

        <div class="big-stat-card">
          <span>오늘 의도적으로 쓴 이동시간</span>
          <strong>18분</strong>
          <small>완료한 행동 2개 · 회복 모드 1회</small>
        </div>

        <div class="section-title">
          <h3>다음 예상 루틴</h3>
          <button class="text-btn" data-next="prompt">데모 보기</button>
        </div>

        <div class="commute-card">
          <div>
            <span class="badge">퇴근길</span>
            <strong>성수 → 합정</strong>
            <small>예상 24분</small>
          </div>
          <div class="card-actions">
            <button class="mini-btn" data-next="prompt">자동 제안</button>
            <button class="mini-btn subtle" data-next="recommend">수동 시작</button>
          </div>
        </div>

        <div class="section-title">
          <h3>오늘 추천 행동</h3>
        </div>

        <div class="mini-list">
          <article class="mini-item">
            <strong>3분 회고</strong>
            <small>퇴근길에 가장 자주 선택한 루틴</small>
          </article>
          <article class="mini-item">
            <strong>저장한 글 1개 읽기</strong>
            <small>예상 7분</small>
          </article>
          <article class="mini-item">
            <strong>의도적 휴식</strong>
            <small>호흡 + 음악 5분</small>
          </article>
        </div>

        <nav class="tab-bar">
          <button class="tab active">홈</button>
          <button class="tab" data-next="report">리포트</button>
          <button class="tab">설정</button>
        </nav>
      </section>
    </template>

    <template id="screen-prompt">
      <section class="screen-view prompt-view">
        <div class="status-chip">자동 감지됨</div>

        <div class="prompt-card">
          <p class="screen-kicker">퇴근길 · 예상 24분</p>
          <h2>지금 3분만 먼저<br />내 시간으로 써볼까요?</h2>
          <p class="screen-copy">
            퇴근길에는 회복 모드가 기본입니다. 짧게 정리하고 나면 남은 시간은
            편하게 보내도 됩니다.
          </p>

          <div class="prompt-reco">
            <span>지금 추천</span>
            <strong>3분 회고</strong>
            <small>오늘 가장 부담 없는 루틴</small>
          </div>
        </div>

        <div class="bottom-actions column">
          <button class="btn btn-primary" data-next="recommend">루틴 시작</button>
          <button class="btn btn-secondary" data-next="home">이번엔 제외</button>
          <button class="text-btn muted-link" data-next="home">이 경로는 덜 보기</button>
        </div>
      </section>
    </template>

    <template id="screen-recommend">
      <section class="screen-view">
        <div class="top-copy">
          <p class="screen-kicker">퇴근길 추천</p>
          <h2>지금 가능한 행동 3개</h2>
          <p class="screen-copy">부담이 가장 낮은 것부터 보여드립니다.</p>
        </div>

        <div class="action-card action-primary" data-next="session">
          <div>
            <span class="badge soft">3분</span>
            <strong>퇴근길 회고</strong>
            <small>오늘 가장 에너지 덜 드는 선택</small>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="action-card" data-next="session">
          <div>
            <span class="badge">7분</span>
            <strong>저장한 글 1개 읽기</strong>
            <small>출퇴근 전용 읽기 리스트</small>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="action-card" data-next="session">
          <div>
            <span class="badge">5분</span>
            <strong>의도적 휴식</strong>
            <small>음악 + 호흡으로 회복하기</small>
          </div>
          <span class="arrow">›</span>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-secondary" data-next="home">나중에</button>
        </div>
      </section>
    </template>

    <template id="screen-session">
      <section class="screen-view session-view">
        <p class="screen-kicker">Active session</p>
        <h2>퇴근길 회고</h2>

        <div class="timer-ring">
          <div>
            <strong>02:14</strong>
            <small>남은 시간</small>
          </div>
        </div>

        <div class="focus-card">
          <span>오늘의 프롬프트</span>
          <strong>오늘 가장 잘한 선택 하나와, 내일 줄일 일 하나를 적어보세요.</strong>
        </div>

        <div class="note-card">
          <p>잘한 선택: 회의 전에 우선순위를 다시 정리했다.</p>
          <p>내일 줄일 일: 퇴근 직전 메신저 확인을 늦게 하지 않기.</p>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-secondary" data-next="recommend">다른 행동</button>
          <button class="btn btn-primary" data-next="reflection">완료</button>
        </div>
      </section>
    </template>

    <template id="screen-reflection">
      <section class="screen-view">
        <div class="completion-mark">✓</div>
        <p class="screen-kicker">세션 완료</p>
        <h2>퇴근길 9분을<br />내 방식으로 썼어요</h2>
        <p class="screen-copy">
          회복 모드를 선택해도 괜찮습니다. 중요한 건 자동 스크롤이 아니라
          선택한 사용이라는 점입니다.
        </p>

        <div class="feedback-panel">
          <span>이번 추천은 어땠나요?</span>
          <div class="emoji-row">
            <button class="emoji active">좋음</button>
            <button class="emoji">보통</button>
            <button class="emoji">별로</button>
          </div>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-primary" data-next="report">리포트 보기</button>
        </div>
      </section>
    </template>

    <template id="screen-report">
      <section class="screen-view report-view">
        <div class="top-copy">
          <p class="screen-kicker">이번 주 리포트</p>
          <h2>작게 쌓였지만,<br />분명히 달라졌어요</h2>
        </div>

        <div class="metrics-grid">
          <article class="metric-box">
            <span>의도적 이동시간</span>
            <strong>126분</strong>
          </article>
          <article class="metric-box">
            <span>완료한 루틴</span>
            <strong>9개</strong>
          </article>
          <article class="metric-box">
            <span>출근길 유지</span>
            <strong>4일</strong>
          </article>
          <article class="metric-box">
            <span>회복 모드</span>
            <strong>3회</strong>
          </article>
        </div>

        <div class="trend-card">
          <span>Week insight</span>
          <strong>퇴근길에는 회고보다 회복 모드를 더 자주 선택했어요.</strong>
          <small>다음 주에는 저에너지 추천 비중을 조금 높일 수 있어요.</small>
        </div>

        <div class="bottom-actions">
          <button class="btn btn-secondary" data-next="home">홈으로</button>
          <button class="btn btn-primary" data-next="prompt">다시 체험</button>
        </div>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
